main_llm:
  provider: deepseek           # deepseek | openrouter
  model: deepseek-v4-flash
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  thinking: false

auxiliary_llm:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com

max_iterations: 50
l1_max_rules: 20
l1_max_rule_length: 100

# Phase 1a: RLCard Leduc Hold'em
rlcard:
  game: leduc-holdem            # leduc-holdem | doudizhu
  eval_episodes: 100
  opponent: leduc-holdem-cfr    # leduc-holdem-cfr | doudizhu-rule-v1
  seed: 42

# Phase 2: Learning pipeline
learning:
  enabled: true
  task_count_weight: 1.0
  complexity_weight: 1.0
  baseline_tokens: 2000
  threshold: 5.0
  pending_dir: data/learning/pending
  learned_dir: data/learning/learned
  raw_dir: data/learning/raw
