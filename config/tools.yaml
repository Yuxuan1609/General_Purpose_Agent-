    timeout: 5
    allowlist: [l2]
    fallback:
      max_retries: 0
      degrade: []

  create_l2_card:
    sync: true
    timeout: 5
    allowlist: [l2]
    fallback:
      max_retries: 0
      degrade: []

  modify_l2_card:
    sync: true
    timeout: 5
    allowlist: [l2]
    fallback:
      max_retries: 0
      degrade: []

  deprecate_l3_skill:
    sync: true
    timeout: 5
    allowlist: [l3]
