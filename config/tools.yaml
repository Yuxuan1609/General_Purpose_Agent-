# Tool system configuration — allowlist, timeout, fallback
# Priority: LLM arg timeout > tool config timeout > default_timeout

default_timeout: 30

tools:
  terminal:
    sync: true
    timeout: 30
    allowlist: [l1, l2, l3]
    fallback:
      max_retries: 2
      degrade:
        - tool: read_file
          hint: "终端不可用时可尝试 read_file 读取目标文件"
        - tool: grep
          hint: "终端不可用时可尝试 grep 搜索文件内容"

  web_search:
    sync: true
    timeout: 15
    allowlist: [l2, l3]
    fallback:
      max_retries: 2
      degrade:
        - tool: tavily_search
          hint: "SearXNG 不可用时可通过 tavily_search 使用 AI 优化搜索引擎"
        - tool: kb_query
          hint: "网络搜索不可用时可尝试 kb_query 查询本地知识库"

  tavily_search:
    sync: true
    timeout: 15
    allowlist: [l2, l3]
    fallback:
      max_retries: 1
      degrade:
        - tool: kb_query
          hint: "Tavily 搜索不可用时可尝试 kb_query 查询本地知识库"

  read_file:
    sync: true
    timeout: 10
    allowlist: [l2, l3]
    fallback:
      max_retries: 1
      degrade: []

  grep:
    sync: true
    timeout: 10
    allowlist: [l2, l3]
    fallback:
      max_retries: 1
      degrade: []

  kb_query:
    sync: true
    timeout: 60
    allowlist: [l1, l2, l3]
    fallback:
      max_retries: 0
      degrade:
        - tool: web_search
          hint: "知识库查询失败时可通过 web_search 联网搜索"

  kb_delete:
    sync: true
    timeout: 5
    allowlist: [l2, l3]
    fallback:
      max_retries: 1
      degrade: []

  kb_fill_gap:
    sync: true
    timeout: 120
    allowlist: [l2, l3]
    fallback:
      max_retries: 0
      degrade:
        - tool: web_search
          hint: "知识填补失败时可通过 web_search 先联网搜索再尝试"

  create_domain:
    sync: true
    timeout: 5
    allowlist: [l1]
    fallback:
      max_retries: 1
      degrade: []

  ask_user:
    sync: true
    timeout: 10
    allowlist: [l1, l2, l3]
    fallback:
      max_retries: 0
      degrade: []

  check_task:
    sync: true
    timeout: 5
    allowlist: [l1, l2, l3]
    fallback:
      max_retries: 0
      degrade: []

  collect_tasks:
    sync: true
    timeout: 10
    allowlist: [l1, l2, l3]
    fallback:
      max_retries: 0
      degrade: []

  record_learning:
    sync: false
    timeout: 5
    allowlist: [l1]
    fallback:
      max_retries: 0
      degrade: []

  # ── Consolidation tools ──
  deprecate_l1_rule:
    sync: true
    timeout: 5
    allowlist: [l1]
    fallback:
      max_retries: 0
      degrade: []

