# L1 — Philosophy Layer 配置
# 行为规则种子与容量控制

# 每层 Manager while 循环最大轮次
max_rounds: 5

# 种子行为规则（Agent 启动时注入，可经 L0.5 审批后修改）
seed_rules:
  - "面对不确定信息时优先搜索验证，不要直接假设答案"
  - "当同一种方法连续3次失败时，主动换策略而非坚持"
  - "代码修改前先用 search/grep 确认改动范围和影响"
  - "工具调用后必须检查返回结果，不能假设成功"

# 容量控制
max_rules: 20
max_rule_length: 300

# 规则持久化路径（运行时数据，非配置）
rules_path: data/layers/l1_rules.json
