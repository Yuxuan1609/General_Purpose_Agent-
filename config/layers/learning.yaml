# LearningEnv 配置 — 学习环境参数
# 将学习建模为独立环境，与 GameEnv 共享 Executor + Layers + ToolUse

# 预处理 LLM（LLM₁）：raw Session → structured LearningUnit
preprocess:
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 2048
  json_mode: true

# 解析 LLM（LLM₂）：NOTIFY 文本 → structured modifications
parse:
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 1024
  json_mode: true

# 触发阈值（沿用 ThresholdScorer 逻辑）
trigger:
  threshold: 5.0            # 触发学习的最低 score
  task_count_weight: 1.0    # 记录数量权重
  complexity_weight: 1.0    # token 复杂度权重
  baseline_tokens: 2000     # token 基线

# 验证
validation:
  use_meta_driver: true     # 使用 MetaDriver.validate_l1_change() 做最后防线
  l2_confidence_min: 0.1
  l2_confidence_max: 1.0

# 知识域
domains:
  primary: "learning/reflect"
  sub_domains:
    - "learning/reflect"
    - "learning/compile"
    - "learning/verify"
